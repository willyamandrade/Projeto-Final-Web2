<!DOCTYPE html>

<html>
    <h2>Bem-vindo, {{ user.username }}!</h2>

    {% if user.perfil.foto %}
        <img src="{{ user.perfil.foto.url }}" width="150">
    {% else %}
        <p><em>Nenhuma foto de perfil cadastrada</em></p>
    {% endif %}
    <p>E-mail: {{ user.email }}</p>

    <form action="{% url 'logout' %}" method="POST">
        {% csrf_token %}
        <button type="submit">Sair do Sistema</button>
    </form>

    <a href='{% url 'painelilha' %}'>Painel de Ilhas</a>
</html>
