{% extends "base.html" %}
{% load static %}

{% block title %} Painel de Ilha {% endblock title %}

    {% block body %}

        <div class="parent">

            <div class="filho">

                <div class="div4">

                    <img class="imgilha" src="{% static 'imgs/ilha.png' %}">
                </div>

                <div class="nav2">
                    <a href="{% url 'home' %}" class="itemnav">Voltar</a>
                    <a href="{% url 'add_ilha' %}"class="itemnav">Adicionar Ilha +</a>
                </div>

                

                
                <table class="tabelai">
                    <thead>
                        <th>Nome da Ilha</th>
                    </thead>
                    {% for ilha in ilhas %}
                    <tr>
                        <td><a href="{% url 'painelmii' ilha.id %}">{{ilha.nome_ilha}}</a></td>
                        <td><a href="{% url 'edit_ilha' ilha.id %}">Editar</a></td>
                        <td><a href="{% url 'del_ilha' ilha.id %}">Excluir</a></td>
                    </tr>
                    {% endfor %}
                
                </table>

            </div>
            
        </div>
        
    {% endblock body %}
