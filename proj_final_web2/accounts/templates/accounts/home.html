<!DOCTYPE html>

<html>
    <h2>Bem-vindo, {{ user.username }}!</h2>

    {% if user.perfil.foto %}
        <img src="{{ user.perfil.foto.url }}" width="150">
    {% else %}
        <p><em>Nenhuma foto de perfil cadastrada</em></p>
    {% endif %}
    <p>E-mail: {{ user.email }}</p>
    <p>Conta ativada? {{ user.perfil.email_confirmado|yesno:"Sim,Não" }}</p>

    <a href="{% url 'logout' %}">Sair do sistema</a>
</html>
