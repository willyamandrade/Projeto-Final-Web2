{% load static %}
<!DOCTYPE html>


<html>
    <head>
        <meta charset="UTF-8">
        <title>Conta</title>
        <link rel="stylesheet" href="{% static 'css/estilo.css' %}">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Chokokutai&family=Copse&family=Palette+Mosaic&display=swap" rel="stylesheet">
    </head>

    <header>
        RegistreMii!
    </header>

    <div class="parent">

        <div class="filho">
            <div class="container">
                <div class="dvs1">
                    {% if user.perfil.foto %}
                    <img class="fotodeperfil" src="{{ user.perfil.foto.url }}" width="150">
                    {% else %}
                    <img class="fotodeperfil" src="..\static\imgs\fotodf.jpg" width="150">
                    {% endif %}
                </div>

                <div class="dvs1">
                    <p>Nome: {{user.username}}</p>
                    <p>E-mail: {{ user.email }}</p>

                    <div class="container2">
                        <p class="vtm"><a href="{% url 'painelmii' %}">Ver todos os miis</a></p>
                        <img class= "bicho" src="..\static\imgs\Mii.webp">
                    </div>
                    
                </div>



            </div>
            


            <div class="container3">

                <div class="qntmiis">
                    <p>05</p>
                </div>

                <div class="li">
                    <div class="painelnav">
                        <div class="itemnav"><a href="{% url 'add_ilha' %}">Adicionar</a></div>
                        <div class="itemnav"><a href="edit_ilha/{{ilha.id}}">Editar</a></div>
                        <div class="itemnav"><a href="del_ilha/{{ilha.id}}">Deletar</a></div>
                    </div>
                    <div class="tailhas">
                        <ul>
                            <li>
                                <a href='{% url 'painelilha' %}'>Painel de Ilhas</a>
                            </li>
                            {% for ilha in ilhas %}
                            <li>{{ilha.nome_ilha}}</li>
                            {% endfor %}
                        </ul>
                    </div>
                </div>
            </div>
            

            

            <form action="{% url 'logout' %}" method="POST">
            {% csrf_token %}
            <button type="submit" class="botao1">Sair do Sistema</button>
            </form>

        </div>

    </div>

    
</html>
